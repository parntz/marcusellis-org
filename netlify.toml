# Publish directory must be ".next" (Next.js build output). @netlify/plugin-nextjs reads from
# here and copies/server-bundles into .netlify/* — not ".netlify/output/public" (that path is
# internal). Do not set Publish to the repo root in the Netlify UI.
# Ref: plugin-context.js DEFAULT_PUBLISH_DIR = ".next"

[build]
  command = "node scripts/db-init.mjs && npm run build"  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
