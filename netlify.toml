# Publish must NOT be the repo root (@netlify/plugin-nextjs rejects publish === base).
# This path is produced when the plugin runs after `next build` (OpenNext output).
# In Netlify UI, either leave Publish directory blank or set it to .netlify/output/public
# so it matches this file.

[build]
  command = "npm run build"
  publish = ".netlify/output/public"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
